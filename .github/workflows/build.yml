name: Build OmniSched v3.1

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Get current date
      id: date
      run: echo "today=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

    - name: Setup CMake 3.30.1
      uses: jwlawson/actions-setup-cmake@v2.1
      with:
        cmake-version: '3.30.1'

    - name: Build C++ Daemon with NDK
      run: |
        mkdir build && cd build
        cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
              -DANDROID_ABI=arm64-v8a \
              -DANDROID_PLATFORM=android-31 \
              ..
        cmake --build .

    - name: Package Magisk Module
      run: |
        mkdir -p module_out/system/bin
        cp build/omnisched module_out/system/bin/ 
        cp module.prop customize.sh module_out/

        cp module/post-fs-data.sh module/service.sh module_out/

        cp -r webroot module_out/

        cp -r META-INF module_out/
        
        cd module_out
        zip -r9 ../OmniSched-v3-Release.zip .

    - name: Upload Artifact
      uses: actions/upload-artifact@v6
      with:
        name: OmniSched-Release-${{ steps.date.outputs.today }}
        path: OmniSched-v3-Release.zip
