name: Build OmniSched v3

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

concurrency:
  group: omnisched-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2.1
        with:
          cmake-version: "3.30.1"

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Cache C++ Build
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-ndk-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Build and Package
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-31 \
            -DANDROID_STL=c++_static
          
          cmake --build build --config Release --parallel $(nproc)

          $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip build/omnisched

          mkdir -p out/system/bin
          cp build/omnisched out/system/bin/
          cp module.prop customize.sh out/
          # 這裡假設你的原始目錄結構
          [ -d module ] && cp -r module/* out/ 
          [ -d webroot ] && cp -r webroot out/
          [ -d META-INF ] && cp -r META-INF out/

          cd out
          zip -r9 ../OmniSched-v3.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniSched-v3-${{ github.run_number }}
          path: OmniSched-v3.zip