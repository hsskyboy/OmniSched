name: Build OmniSched V2

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Get current date
      id: date
      run: echo "today=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

    - name: Setup CMake 3.30.1
      uses: jwlawson/actions-setup-cmake@v2.1
      with:
        cmake-version: '3.30.1'

    - name: Build C++ Daemon with NDK
      run: |
        mkdir build && cd build
        cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
              -DANDROID_ABI=arm64-v8a \
              -DANDROID_PLATFORM=android-31 \
              ..
        make

    - name: Package Magisk Module
      run: |
        mkdir -p module_out/common
        cp build/omnisched_daemon module_out/
        cp module.prop customize.sh module_out/
        cp common/system.prop common/post-fs-data.sh common/service.sh module_out/common/
        cp -r META-INF module_out/
        
        cd module_out
        zip -r9 ../OmniSched-V2-${{ steps.date.outputs.today }}.zip .

    - name: Upload Artifact
      uses: actions/upload-artifact@v6
      with:
        name: OmniSched-V2-Release-${{ steps.date.outputs.today }}
        path: OmniSched-V2-Artifact.zip
