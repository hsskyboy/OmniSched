<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>OmniSched</title>
<style>
/* ColorOS 深色模式设计规范变量 */
:root {
    --bg: #0F0F10;
    --card: #1C1C1E;
    --primary: #2BA84A;
    --primary-dark: #24903F;
    --text: #F5F5F7;
    --secondary: #8E8E93;
    --border: #2C2C2E;
    --switch-off-bg: #3A3A3C;
    --toast-bg: rgba(30, 30, 32, 0.85);
}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:24px 16px;margin:0;-webkit-tap-highlight-color:transparent}
.card{background:var(--card);border-radius:24px;padding:20px 24px;border:1px solid var(--border);box-shadow:0 4px 16px rgba(0,0,0,.15)}
.t{font-size:20px;font-weight:600;margin-bottom:6px}
.st{font-size:13px;color:var(--secondary);margin-bottom:20px;line-height:1.4}
.li{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid var(--border)}
.li:last-child{border:0;padding-bottom:0}
.it{font-size:16px;font-weight:500;margin-bottom:4px}
.id{font-size:12px;color:var(--secondary);line-height:1.4;padding-right:16px}
.sw{position:relative;width:52px;height:32px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sl{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--switch-off-bg);transition:.3s;border-radius:32px}
.sl:before{position:absolute;content:"";height:24px;width:24px;left:4px;bottom:4px;background:#fff;transition:.3s;border-radius:50%;box-shadow:0 2px 4px rgba(0,0,0,.2)}
input:checked+.sl{background:var(--primary)}
input:checked+.sl:before{transform:translateX(20px)}
.rc{margin-top:16px;padding:12px 0 4px;border-bottom:1px solid var(--border)}
.rh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.rv{font-size:16px;font-weight:600;color:var(--primary)}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:8px;background:linear-gradient(to right,var(--primary) var(--pc,0%),var(--switch-off-bg) var(--pc,0%));border-radius:8px;outline:0;margin-bottom:16px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.25);transition:transform .2s}
input[type=range]:active::-webkit-slider-thumb{transform:scale(1.15)}
.toast{position:fixed;bottom:40px;left:50%;transform:translate(-50%,20px);background:var(--toast-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:var(--text);padding:14px 24px;border-radius:100px;font-size:14px;font-weight:500;opacity:0;visibility:hidden;transition:.4s;pointer-events:none;z-index:99}
.toast.s{opacity:1;visibility:visible;transform:translate(-50%,0)}
</style>
</head>
<body>
<div class="card">
    <div class="t">OmniSched 核心配置</div>
    <div class="st">设置将自动写入底层，守护进程即时热重载，无需重启设备。</div>
    <div class="rc">
        <div class="rh"><div class="it">兜底巡检间隔 (秒)</div><div class="rv" id="v_i">950</div></div>
        <input type="range" id="i_i" min="300" max="3600" step="50" value="950">
    </div>
    <div class="li">
        <div><div class="it">强制 Vulkan 渲染</div><div class="id">Android 14+ 推荐，劫持 Ski底层引擎降低 GPU 负载。</div></div>
        <label class="sw"><input type="checkbox" id="i_v"><span class="sl"></span></label>
    </div>
    <div class="li">
        <div><div class="it">背景严格锁死小核</div><div class="id">将后台进程 Cpuset 隔离在小核集群，改善待机功耗。</div></div>
        <label class="sw"><input type="checkbox" id="i_b"><span class="sl"></span></label>
    </div>
    <div class="li">
        <div><div class="it">Lite Mode</div><div class="id">Reduce peak power and heat for better battery life. Gaming performance may drop.</div></div>
        <label class="sw"><input type="checkbox" id="i_l"><span class="sl"></span></label>
    </div>
</div>
<div id="toast" class="toast">设置已保存并生效</div>
<script>
const P = "/data/adb/omnisched/config.json";
const DEFAULT_CONFIG = {
    poll_interval_seconds: 950,
    cpuset: { background_little_core_only: true },
    render: { force_vulkan: false },
    performance: { lite_mode: false }
};
let cfg = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
let tm;
const _=(id)=>document.getElementById(id);
const $i=_('i_i'), $v=_('v_i'), $vk=_('i_v'), $bg=_('i_b'), $lm=_('i_l'), $t=_('toast');

    async function load() {
        try {
            let r = await ksu.exec(`cat ${P}`);
            let out = typeof r === 'string' ? r : (r && r.stdout) || "";
            out = out.trim();
            if (out.startsWith('{')) {
                let j = JSON.parse(out);
                if (j.poll_interval_seconds !== undefined) cfg.poll_interval_seconds = j.poll_interval_seconds;
                if (j.cpuset && j.cpuset.background_little_core_only !== undefined) cfg.cpuset.background_little_core_only = j.cpuset.background_little_core_only;
                if (j.render && j.render.force_vulkan !== undefined) cfg.render.force_vulkan = j.render.force_vulkan;
                if (j.performance && j.performance.lite_mode !== undefined) cfg.performance.lite_mode = j.performance.lite_mode;
            }
        } catch (e) {}
        updUI();
    }

    function updUI() {
        $i.value = cfg.poll_interval_seconds;
        $v.textContent = cfg.poll_interval_seconds;
        $vk.checked = cfg.render.force_vulkan;
        $bg.checked = cfg.cpuset.background_little_core_only;
        $lm.checked = cfg.performance.lite_mode;
        fill($i);
    }

    function fill(e) {
        e.style.setProperty('--pc', `${((e.value - e.min) / (e.max - e.min)) * 100}%`);
    }

    async function save() {
        cfg.poll_interval_seconds = parseInt($i.value);
        cfg.render.force_vulkan = $vk.checked;
        cfg.cpuset.background_little_core_only = $bg.checked;
        cfg.performance.lite_mode = $lm.checked;
        await ksu.exec(`echo '${JSON.stringify(cfg)}' > ${P}`);
        clearTimeout(tm);
        $t.classList.add('s');
        tm = setTimeout(() => $t.classList.remove('s'), 2000);
    }

    $i.addEventListener('input', e => { $v.textContent = e.target.value; fill(e.target); });
    $i.addEventListener('change', save);
    $vk.addEventListener('change', save);
    $bg.addEventListener('change', save);
    $lm.addEventListener('change', save);
    load();
</script>
</body>
</html>
